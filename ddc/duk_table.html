<!DOCTYPE html>
<html lang="en">
<head>
<!--
  <meta charset="UTF-8">
  <title>VA Table With Selection</title>
-->
  <!-- SAS VA Utilities (local relative paths) -->
	<script type="text/javascript" src="./util/messagingUtil.js"></script>
    <script type="text/javascript" src="./util/contentUtil.js"></script>
	
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f6f8;
    }

    .message {
      display: none;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 120px;
      background-color: #ffffff;
      border: 1px dashed #d1d5db;
      border-radius: 6px;
      color: #6b7280;
      font-size: 16px;
    }

    table {
      display: none;
      border-collapse: collapse;
      width: 100%;
      background-color: #ffffff;
    }

    thead {
      background-color: #111827;
      color: white;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 13px;
      text-align: left;
    }

    tbody tr:nth-child(odd) {
      background-color: #f9fafb;
    }

    tbody tr:hover {
      background-color: #eef2ff;
      cursor: pointer;
    }

    tbody tr.selected {
      background-color: #c7d2fe !important;
    }
  </style>
</head>
<body>

  <!-- Messages -->
  <div id="assignMessage" class="message">Assign a data first.</div>
  <div id="noDataMessage" class="message">No data returned.</div>

  <!-- Data-driven table -->
  <table id="vaTable">
    <thead></thead>
    <tbody></tbody>
  </table>

<script>
  const table = document.getElementById("vaTable");
  const thead = table.querySelector("thead");
  const tbody = table.querySelector("tbody");

  const assignMessage = document.getElementById("assignMessage");
  const noDataMessage = document.getElementById("noDataMessage");

  let selectedRowIndex = null;

  /* -----------------------------
   * Utility functions
   * ----------------------------- */
  function showAssignMessage() {
    assignMessage.style.display = "flex";
    noDataMessage.style.display = "none";
    table.style.display = "none";
  }

  function showNoDataMessage() {
    assignMessage.style.display = "none";
    noDataMessage.style.display = "flex";
    table.style.display = "none";
  }

  function showTable() {
    assignMessage.style.display = "none";
    noDataMessage.style.display = "none";
    table.style.display = "table";
  }

  /* -----------------------------
   * Build table header
   * ----------------------------- */
  function buildHeader(columns) {
    thead.innerHTML = "";
    const tr = document.createElement("tr");

    columns.forEach(col => {
      const th = document.createElement("th");
      th.textContent = col.label || col.name;
      tr.appendChild(th);
    });

    thead.appendChild(tr);
  }

  /* -----------------------------
   * Build table body
   * ----------------------------- */
  function buildBody(rows) {
    tbody.innerHTML = "";

    rows.forEach((row, index) => {
      const tr = document.createElement("tr");

      row.forEach(cell => {
        const td = document.createElement("td");
        td.textContent = cell === null ? "" : cell;
        tr.appendChild(td);
      });

      tr.addEventListener("click", () => selectRow(index, tr));
      tbody.appendChild(tr);
    });
  }

  /* -----------------------------
   * Row selection + VA feedback
   * ----------------------------- */
  function selectRow(index, rowElement) {
    clearSelection();

    selectedRowIndex = index;
    rowElement.classList.add("selected");

    va.messagingUtil.postSelectionMessage({
      selection: {
        type: "byIndex",
        values: [index]
      }
    });
  }

  function clearSelection() {
    Array.from(tbody.children).forEach(tr =>
      tr.classList.remove("selected")
    );
    selectedRowIndex = null;
  }

  /* -----------------------------
   * Handle data messages from VA
   * ----------------------------- */
  function onDataReceived(message) {
    if (!message || !message.data || !message.data.columns) {
      showAssignMessage();
      return;
    }

    const rows = message.data.data || [];

    if (rows.length === 0) {
      showNoDataMessage();
      return;
    }

    showTable();
    buildHeader(message.data.columns);
    buildBody(rows);
    clearSelection();
  }

  /* -----------------------------
   * Initialize VA integration
   * ----------------------------- */
  showNoDataMessage();
  va.messagingUtil.setOnDataMessage(onDataReceived);
  va.contentUtil.setupResizeListener(() => {});
</script>

</body>
</html>
