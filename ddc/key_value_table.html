<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VA Key-Value DDC</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background-color: #ffffff;
    }

    .kv-table {
      display: grid;
      grid-template-columns: 1fr 2fr;
      row-gap: 8px;
      column-gap: 12px;
      align-items: center;
    }

    .kv-name {
      font-weight: 600;
      color: #333333;
      text-align: left;
      padding-right: 8px;
    }

    .kv-value {
      color: #000000;
      word-break: break-word;
    }

    .no-data {
      color: #888888;
      font-style: italic;
    }
  </style>
</head>

<body>
  <div id="content" class="no-data">
    Waiting for data…
  </div>

  <script>
    (function () {
      "use strict";

      /**
       * Clear existing content
       */
      function clearContent() {
        const content = document.getElementById("content");
        content.innerHTML = "";
        content.className = "kv-table";
      }

      /**
       * Render key–value layout
       */
      function render(data) {
        const content = document.getElementById("content");

        if (
          !data ||
          !data.data ||
          data.data.length === 0 ||
          !data.columns
        ) {
          content.innerText = "No data available";
          content.className = "no-data";
          return;
        }

        const row = data.data[0]; // single-row assumption

        clearContent();

        data.columns.forEach(function (column, index) {
          const nameDiv = document.createElement("div");
          nameDiv.className = "kv-name";
          nameDiv.textContent =
            column.label || column.name || ("Column " + (index + 1));

          const valueDiv = document.createElement("div");
          valueDiv.className = "kv-value";

          const value = row[index];
          valueDiv.textContent =
            value === null || value === undefined ? "" : value;

          content.appendChild(nameDiv);
          content.appendChild(valueDiv);
        });
      }

      /**
       * Listen for messages from VA
       */
      window.addEventListener("message", function (event) {
        const message = event.data;

        if (!message || message.type !== "va-data") {
          return;
        }

        render(message.data);
      });
    })();
  </script>
</body>
</html>
